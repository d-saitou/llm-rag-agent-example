- name: Git設定
  become_user: "{{ wsl_user_name }}"
  git_config:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    scope: global
  loop:
    - { name: "user.name", value: "{{ git_user_name }}" }
    - { name: "user.email", value: "{{ git_user_email }}" }

- name: Gitリポジトリクローン
  become_user: "{{ wsl_user_name }}"
  git:
    repo: "{{ git_repo_url }}"
    dest: "/home/{{ wsl_user_name }}/{{ git_repo_name }}"
    version: HEAD
