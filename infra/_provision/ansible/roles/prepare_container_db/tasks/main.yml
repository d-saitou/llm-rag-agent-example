---
- name: DB コンテナ用 secrets ディレクトリ作成
  ansible.builtin.file:
    path: "{{ db_secrets_dir }}"
    state: directory
    owner: "{{ wsl_uid }}"
    group: "{{ wsl_gid }}"
    mode: '0755'

- name: DBパスワードファイル作成
  ansible.builtin.copy:
    dest: "{{ db_secrets_dir }}/{{ item.path }}"
    content: "{{- item.value -}}" # Jinja2の {{- ... -}} を使用して前後の空白・改行除去
    owner: "{{ wsl_uid }}"
    group: "{{ wsl_gid }}"
    mode: '0644'
  loop:
    - { path: "postgres_user.secret", value: "{{ db_postgres_user_password }}" }
    - { path: "app_tx_user.secret", value: "{{ db_app_tx_user_password }}" }
    - { path: "app_rag_user.secret", value: "{{ db_app_rag_user_password }}" }
    - { path: "redmine_user.secret", value: "{{ db_redmine_user_password }}" }
  no_log: true # コンソールパスワード表示防止
