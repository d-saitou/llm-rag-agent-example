services:

  # --- Backend (FastAPI) ---
  backend:
    build:
      context: .
      dockerfile: infra/backend/Dockerfile
      args:
        BACKEND_PYTHON_VERSION: "${BACKEND_PYTHON_VERSION}"
        APP_UID: "${WSL_UID}"
        APP_GID: "${WSL_GID}"
    command: > # 開発環境用：debugpyデバッグ＋ホットリロード
      uv run python -m debugpy --listen 0.0.0.0:5678 -m uvicorn server.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redmine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "8000:8000"
      - "5678:5678" # 開発環境用：debugpyデバッグ
    volumes:
      - .:/app              # 開発環境用：コンテナ内ソースのホットリロード＋git管理のためルートをマウント
      - backend_venv:/.venv # 開発環境用：Python仮想環境ボリューム

  # --- DB (PostgreSQL + pgvector) ---
  db:
    build:
      context: .
      dockerfile: infra/db/Dockerfile
      args:
        DB_PGVECTOR_VERSION: "${DB_PGVECTOR_VERSION}"
    user: "${WSL_UID}:${WSL_GID}"
    # restart: always
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db_postgres_user
      PGDATA: /var/lib/postgresql/data/pgdata
    secrets:
      - db_postgres_user
      - db_app_tx_user
      - db_app_rag_user
      - db_redmine_user
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infra/db/initdb.d:/docker-entrypoint-initdb.d
      - ./data/db/backups/postgres:/var/backups/postgres

  # --- Redmine ---
  redmine:
    build:
      context: .
      dockerfile: infra/redmine/Dockerfile
      args:
        REDMINE_VERSION: "${REDMINE_VERSION}"
    user: "${WSL_UID}:${WSL_GID}"
    # restart: always
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "8080:3000"
    environment:
      REDMINE_DB_POSTGRES: db
      REDMINE_DB_DATABASE: redmine_db
      REDMINE_DB_USERNAME: redmine
      REDMINE_DB_PASSWORD_FILE: /run/secrets/db_redmine_user
    secrets:
      - db_redmine_user
    volumes:
      - ./data/redmine/files:/usr/src/redmine/files

secrets:
  db_postgres_user:
    file: ./infra/db/secrets/postgres_user.secret
  db_app_tx_user:
    file: ./infra/db/secrets/app_tx_user.secret
  db_app_rag_user:
    file: ./infra/db/secrets/app_rag_user.secret
  db_redmine_user:
    file: ./infra/db/secrets/redmine_user.secret

volumes:
  backend_venv:
  db_data:
